<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hadith Reader</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<header class="hadith-header">

<button id="backBtn">
←
</button>

<div class="hadith-info">

<h3 id="chapterTitle">
Loading...
</h3>

<p id="hadithCounter">
1 / 1
</p>

</div>

</header>

<div class="reader-wrapper">

<div id="hadithCard" class="hadith-card">

<div id="arabicText"
class="arabic-text">
</div>

<div id="narrator"
class="narrator">
</div>

<div id="englishText"
class="english-text">
</div>

<div id="reference"
class="reference">
</div>
<button id="saveCollectionBtn">

🔖 Save

</button>
</div>

</div>

<div class="nav-buttons">

<button id="prevBtn">
◀ Previous
</button>

<button id="nextBtn">
Next ▶
</button>

</div>

<script src="data/booksData.js"></script>

<script src="data/bukhari.js"></script>
<script src="data/muslim.js"></script>
<script src="data/nasai.js"></script>
<script src="data/abudawood.js"></script>
<script src="data/tirmidhi.js"></script>
<script src="data/ibnmajah.js"></script>
<script src="data/malik.js"></script>
<script src="data/ahmed.js"></script>
<script src="data/darimi.js"></script>

<script src="js/hadith-page.js"></script>

</body>
</html>
